name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        run: node --test ./pi-extension/test/*.test.js ./scripts/test-check-rule-copies.test.js
      - name: Check that all wrappers match RULES.md
        run: node scripts/check-rule-copies.js